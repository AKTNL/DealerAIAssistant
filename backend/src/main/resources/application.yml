server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: agent-poc-backend
  datasource:
    url: jdbc:h2:mem:agentpoc;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

app:
  auth:
    access-key: ${APP_ACCESS_KEY:}
    session-secret: ${APP_SESSION_SECRET:}
    session-ttl: ${APP_SESSION_TTL:8h}
  security:
    api-key: ${APP_API_KEY:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  excel:
    path: ${APP_EXCEL_PATH:classpath:Sample Data.xlsx}
  model:
    allowed-hosts: ${APP_MODEL_ALLOWED_HOSTS:}
    allow-private-hosts: ${APP_MODEL_ALLOW_PRIVATE_HOSTS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    url: /openapi.json
    path: /swagger-ui.html

logging:
  level:
    com.brand.agentpoc: INFO
